<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Red Ball 1 - Mobile</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; position: fixed;
        }
        #game-container {
            width: 100vw; height: 100vh; position: absolute;
            top: 0; left: 0; z-index: 1;
            display: flex; justify-content: center; align-items: center;
        }
        #ruffle { width: 100%; height: 100%; display: block; }
        
        #controls-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999999; pointer-events: none;
        }
        #control-left-side {
            position: absolute; bottom: 35px; left: 35px;
            display: flex; gap: 20px; pointer-events: auto;
        }
        #control-right-side {
            position: absolute; bottom: 35px; right: 45px; pointer-events: auto;
        }
        .btn {
            width: 85px; height: 85px;
            background: linear-gradient(135deg, rgba(60,60,60,0.55), rgba(35,35,35,0.65));
            color: rgba(255,255,255,0.85); border: 3px solid rgba(255,255,255,0.35);
            border-radius: 50%; font-size: 36px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            touch-action: none; box-shadow: 0 6px 12px rgba(0,0,0,0.5);
        }
        .btn:active { transform: scale(0.92); background: rgba(255,255,255,0.5); }
        #btn-jump {
            width: 95px; height: 95px;
            background: linear-gradient(135deg, rgba(255,112,67,0.6), rgba(244,81,30,0.65));
            border-color: rgba(255,171,145,0.45);
        }
    </style>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>

    <div id="game-container">
        <div id="ruffle"></div>
    </div>

    <div id="controls-layer">
        <div id="control-left-side">
            <div id="btn-left" class="btn">◀</div>
            <div id="btn-right" class="btn">▶</div>
        </div>
        <div id="control-right-side">
            <div id="btn-jump" class="btn">▲</div>
        </div>
    </div>

    <script>
        let player = null;
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "allowScriptAccess": true, "quality": "low", "autoplay": "on",
            "unmuteOverlay": "hidden", "letterbox": "on", "wmode": "direct",
            "preloader": false, "contextMenu": false, "warnOnUnsupportedContent": false
        };

        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            player = ruffle.createPlayer();
            document.getElementById("ruffle").appendChild(player);
            player.load({ url: "redball1.swf", allowScriptAccess: true, wmode: "direct" });
        });

        // Forzar Pantalla Completa al primer toque
        document.addEventListener("touchstart", function() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            if (player) player.focus();
        }, {once: true});

        function simulateKey(keyCode, keyName, eventType) {
            const event = new KeyboardEvent(eventType, {
                key: keyName, code: keyName, keyCode: keyCode,
                which: keyCode, bubbles: true, cancelable: true
            });
            document.dispatchEvent(event);
        }

        function setupButton(id, keyCode, keyName) {
            const btn = document.getElementById(id);
            btn.addEventListener("touchstart", (e) => { e.preventDefault(); simulateKey(keyCode, keyName, "keydown"); });
            btn.addEventListener("touchend", (e) => { e.preventDefault(); simulateKey(keyCode, keyName, "keyup"); });
        }

        setupButton("btn-left", 37, "ArrowLeft");
        setupButton("btn-right", 39, "ArrowRight");
        setupButton("btn-jump", 38, "ArrowUp");
    </script>
</body>
</html>
