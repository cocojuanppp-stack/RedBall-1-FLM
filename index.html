<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Red Ball Game</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; position: fixed;
        }
        #game-container {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        #ruffle { width: 100%; height: 100%; }
        
        /* Capa de controles (si los usas) */
        #controls-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999999; pointer-events: none;
        }
        .btn { pointer-events: auto; }
    </style>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>

    <div id="game-container">
        <div id="ruffle"></div>
    </div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "allowScriptAccess": true, "quality": "low", "autoplay": "on",
            "unmuteOverlay": "hidden", "letterbox": "on", "wmode": "direct",
            "preloader": false, "contextMenu": false
        };

        window.addEventListener("load", () => {
            setTimeout(() => {
                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                document.getElementById("ruffle").appendChild(player);
                
                // CAMBIA ESTO SEGUN EL JUEGO: 'redball1.swf' o 'redball3.swf'
                player.load({ 
                    url: "redball1.swf", 
                    allowScriptAccess: true, 
                    wmode: "direct" 
                });
            }, 500);
        });

        // Forzar pantalla completa al primer toque
        document.addEventListener("touchstart", function() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }, {once: true});
    </script>
</body>
</html>
